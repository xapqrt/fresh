appId: com.zvipexx.dawn
productName: Dawn Client
directories:
  output: "build"
npmRebuild: false
win:
  target:
    - target: nsis
  icon: "src/assets/img/icon.png"
  artifactName: "${name}-setup-win-${version}.${ext}"
mac:
  target:
    - target: dmg
      arch:
        - arm64
  icon: "src/assets/img/icon.icns"
  artifactName: "${name}-setup-mac-${version}-arm64.${ext}"
  extendInfo:
    LSApplicationCategoryType: "public.app-category.games"
    NSSupportsAutomaticGraphicsSwitching: true
    NSAppSleepDisabled: true
linux:
  target:
    - AppImage
    - tar.gz
  category: Game
  icon: "src/assets/img/icon.png"
  artifactName: "${name}-${version}-linux-${arch}.${ext}"
